<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>Glassmorphism Interface</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            background: linear-gradient(to right, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.2));\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            height: 100vh;\n            pointer-events: none;\n            backdrop-filter: blur(10px);\n        }\n        .card {\n            background: rgba(255, 255, 255, 0.1);\n            border-radius: 15px;\n            padding: 20px;\n            margin: 15px;\n            width: 300px;\n            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);\n            pointer-events: auto;\n        }\n        .form {\n            display: flex;\n            flex-direction: column;\n        }\n        input[type='text'] {\n            padding: 10px;\n            margin: 5px 0;\n            border: none;\n            border-radius: 5px;\n            background: rgba(255, 255, 255, 0.2);\n        }\n        button {\n            padding: 10px;\n            border: none;\n            border-radius: 5px;\n            background: #007bff;\n            color: white;\n            cursor: pointer;\n        }\n        button:hover {\n            background: #0056b3;\n        }\n    </style>\n</head>\n<body>\n    <h1>Video Preview Cards</h1>\n    <div class='card'>\n        <h2>Sample Video 1</h2>\n        <video width='300' controls>\n            <source src='video1.mp4' type='video/mp4'>\n            Your browser does not support the video tag.\n        </video>\n    </div>\n    <div class='card'>\n        <h2>Sample Video 2</h2>\n        <video width='300' controls>\n            <source src='video2.mp4' type='video/mp4'>\n            Your browser does not support the video tag.\n        </video>\n    </div>\n    <h2>Add Bilibili BV Number</h2>\n    <form class='form'>\n        <input type='text' id='bvNumber' placeholder='Enter BV number' required>\n        <button type='submit'>Add Video</button>\n    </form>\n</body>\n</html>
